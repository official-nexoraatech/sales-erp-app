{{- $global := .Values.global }}
{{- range $name, $svc := .Values.services }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $global.namespace }}
  labels:
    app: {{ $name }}
spec:
  selector:
    app: {{ $name }}
  ports:
    - name: http
      port: 80
      targetPort: {{ $svc.port }}
      protocol: TCP
---
{{- end }}
