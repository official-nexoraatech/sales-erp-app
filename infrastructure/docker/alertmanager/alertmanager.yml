global:
  resolve_timeout: 5m

route:
  receiver: slack-infra-alerts  # fallback if an alert has no channel label
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - channel = "pagerduty"
      receiver: pagerduty
      group_wait: 30s
      repeat_interval: 1h
      continue: false

    - matchers:
        - channel = "slack-infra-alerts"
      receiver: slack-infra-alerts
      group_wait: 2m
      repeat_interval: 4h
      continue: false

    - matchers:
        - channel = "slack-engineering"
      receiver: slack-engineering
      group_wait: 2m
      repeat_interval: 4h
      continue: false

receivers:
  - name: pagerduty
    pagerduty_configs:
      - service_key_file: /run/secrets/pagerduty_service_key
        send_resolved: true
        description: '{{ .CommonAnnotations.summary }}'

  - name: slack-infra-alerts
    slack_configs:
      - api_url_file: /run/secrets/slack_infra_webhook_url
        channel: '#infra-alerts'
        send_resolved: true
        title: '{{ .CommonAnnotations.summary }}'
        text: '{{ .CommonAnnotations.description }}'

  - name: slack-engineering
    slack_configs:
      - api_url_file: /run/secrets/slack_engineering_webhook_url
        channel: '#engineering-alerts'
        send_resolved: true
        title: '{{ .CommonAnnotations.summary }}'
        text: '{{ .CommonAnnotations.description }}'

inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ['alertname', 'service']
