[databases]
; Connection to postgres-primary using docker-compose service name
erp = host=postgres-primary port=5432 dbname=erp

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
auth_file = /etc/pgbouncer/userlist.txt
auth_type = md5

; Transaction pooling — required for Phase 13 (13.3.3)
pool_mode = transaction

; Connection limits
max_client_conn = 1000
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 10
reserve_pool_timeout = 5

; Timeouts
server_connect_timeout = 15
server_idle_timeout = 600
client_idle_timeout = 0

; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

; Admin access
admin_users = erp
