apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  namespace: erp-system
  labels:
    app: search-service
    version: v1
    part-of: erp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
        version: v1
      annotations:
        # Vault agent sidecar injection
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "search-service"
        vault.hashicorp.com/agent-inject-secret-db: "erp/data/search-service/db"
        vault.hashicorp.com/agent-inject-template-db: |
          {{- with secret "erp/data/search-service/db" -}}
          export DATABASE_URL="{{ .Data.data.url }}"
          {{- end }}
        vault.hashicorp.com/agent-inject-secret-jwt: "erp/data/search-service/jwt"
        vault.hashicorp.com/agent-inject-template-jwt: |
          {{- with secret "erp/data/search-service/jwt" -}}
          export JWT_PUBLIC_KEY="{{ .Data.data.public_key }}"
          {{- end }}
        # Prometheus scraping
        prometheus.io/scrape: "true"
        prometheus.io/port: "3017"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: search-service
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: search-service
          image: ghcr.io/nexoraatech/erp/search-service:latest
          ports:
            - name: http
              containerPort: 3017
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: SEARCH_SERVICE_PORT
              value: "3017"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: erp-redis-secret
                  key: url
            - name: LOKI_URL
              value: "http://loki.erp-infra.svc.cluster.local:3100"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger-collector.erp-infra.svc.cluster.local:4318"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3017
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3017
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: erp-system
  labels:
    app: search-service
spec:
  selector:
    app: search-service
  ports:
    - name: http
      port: 80
      targetPort: 3017
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: search-service-hpa
  namespace: erp-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: search-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: search-service-pdb
  namespace: erp-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: search-service
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: search-service
  namespace: erp-system
  labels:
    app: search-service
