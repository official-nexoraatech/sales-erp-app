# cert-manager ClusterIssuer — Let's Encrypt production
# Requires cert-manager to be installed: kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: devops@nexoraatech.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
# cert-manager ClusterIssuer — Let's Encrypt staging (for development/testing)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: devops@nexoraatech.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
# Self-signed issuer for internal service-to-service certs (development)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: erp-internal-ca
spec:
  selfSigned: {}
---
# Internal CA Certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: erp-internal-ca-cert
  namespace: erp-system
spec:
  isCA: true
  commonName: erp-internal-ca
  secretName: erp-internal-ca-tls
  privateKey:
    algorithm: RSA
    size: 4096
  issuerRef:
    name: erp-internal-ca
    kind: ClusterIssuer
    group: cert-manager.io
---
# Issuer for erp-system using the internal CA
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: erp-internal-issuer
  namespace: erp-system
spec:
  ca:
    secretName: erp-internal-ca-tls
