# Default deny-all ingress and egress for erp-system
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: erp-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow DNS resolution for all pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: erp-system
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Allow auth-service ingress from health checks
# TODO: re-add a from-podSelector entry for api-gateway once it's implemented, see ES-28.
# api-gateway is currently a 4-line stub (see ES-27_COMPLETION.md) — services are reached
# directly and each independently enforces its own auth (hardened in ES-21).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth-service-ingress
  namespace: erp-system
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: erp-infra
      ports:
        - port: 3010
---
# Allow auth-service egress to database and Redis
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth-service-egress
  namespace: erp-system
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: erp-infra
      ports:
        - port: 5432  # PostgreSQL
        - port: 6379  # Redis
        - port: 8200  # Vault
        - port: 3100  # Loki
        - port: 4318  # OTLP HTTP
