# PG-024 — Prometheus Pushgateway. The backup CronJob is a batch process, not
# a long-running scrape target, so it pushes erp_backup_last_success_timestamp/
# duration/size here after every run; Prometheus scrapes Pushgateway itself.
# Kubernetes equivalent of the docker-compose `pushgateway` service.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pushgateway
  namespace: erp-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pushgateway
  template:
    metadata:
      labels:
        app: pushgateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: pushgateway
          image: prom/pushgateway:v1.9.0
          ports:
            - containerPort: 9091
          readinessProbe:
            httpGet:
              path: /-/healthy
              port: 9091
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: pushgateway
  namespace: erp-system
spec:
  selector:
    app: pushgateway
  ports:
    - port: 9091
      targetPort: 9091
