<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXORAA POS</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0252F2" />
    <link rel="icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NEXORAA POS" />
    <!-- Applies the user's saved dark-mode preference to <html> before React mounts, so
         the page doesn't flash light mode on every load for a user who chose dark. Mirrors
         apps/pos-frontend/src/context/ThemeContext.tsx — keep in sync if that changes. -->
    <script>
      (function () {
        try {
          var mode = localStorage.getItem('erp-theme');
          var isDark = mode ? mode === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
