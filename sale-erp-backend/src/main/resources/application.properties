spring.application.name=texmintra

# ========================
# Server Configuration
# ========================
server.port=${PORT:8081}
server.servlet.context-path=/

# ========================
# Database Configuration
# ========================
# Environment variables override these local-development defaults.
# Flyway uses this datasource unless separate properties are configured.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sale-erpapp}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / Hibernate Configuration
# ========================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.open-in-view=false

# ========================
# JPA Auditing Configuration
# ========================
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.entity-defs.mapping-precedence=class,hbm

# ========================
# Flyway Configuration
# ========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=false
spring.flyway.clean-on-validation-error=false

# ========================
# JWT Configuration
# ========================
jwt.secret=${JWT_SECRET:your-super-secret-jwt-key-change-this-in-production-environment}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ========================
# File Upload Configuration
# ========================
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:6MB}

# ========================
# AWS S3 Configuration
# ========================
app.aws.s3.bucket=${AWS_S3_BUCKET:${AWS_S3_BUCKET_NAME:nexoraa-billing-top}}
app.aws.s3.region=${AWS_REGION:ap-south-1}
app.aws.s3.public-url=${AWS_S3_PUBLIC_URL:https://nexoraa-billing-top.s3.ap-south-1.amazonaws.com}
app.aws.s3.max-image-size=${AWS_S3_MAX_IMAGE_SIZE:5MB}
app.aws.s3.allowed-content-types=${AWS_S3_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp}
app.aws.s3.access-key-id=${AWS_ACCESS_KEY_ID:AKIA2EBLK5QOE5EDU6GD}
app.aws.s3.secret-access-key=${AWS_SECRET_ACCESS_KEY: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}
app.aws.s3.session-token=${AWS_SESSION_TOKEN:}

# ========================
# Logging Configuration
# ========================
logging.level.root=INFO
logging.level.com.nexoraa.billtop=${APP_LOG_LEVEL:INFO}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n%ex{full}

# ========================
# CORS Configuration
# ========================
app.cors.allowed-origin-patterns=https://texmitra.nexoraatech.com,http://localhost:5173,http://23.20.56.208:5175

# ========================
# Swagger/OpenAPI Configuration
# ========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ========================
# Permission Management Configuration
# ========================
# Permissions are now managed in the database and loaded via:
# - Configuration: src/main/resources/permissions-config.yaml
# - Database Migration: src/main/resources/db/migration/V3__insert_permissions.sql
# - Table: permissions (persisted in database)
#
# Permission assignment to roles is done via the role_permissions table
# No configuration changes needed here - all permissions are database-driven

# ========================
# SMS Provider Configuration
# ========================
app.sms.provider-url=${SMS_PROVIDER_URL:}
app.sms.api-key=${SMS_API_KEY:}

# ========================
# WhatsApp Provider Configuration (WATI)
# ========================
# WATI_API_KEY must be set as an environment variable, never committed here.
app.whatsapp.api-base-url=${WATI_API_BASE_URL:https://app-server.wati.io/api/v1}
app.whatsapp.api-key=${WATI_API_KEY:}
# Name of the WATI-approved template that has a Document header (create this in
# the WATI dashboard first, then set the approved template name here).
app.whatsapp.invoice-template-name=${WATI_INVOICE_TEMPLATE_NAME:}
# Must match the header variable name configured on that template in WATI.
app.whatsapp.document-header-param-name=${WATI_DOCUMENT_HEADER_PARAM_NAME:document}

# ========================
# Email Provider Configuration
# ========================
# Supports MAIL_* names used by SMTP providers/deployments while keeping
# SPRING_MAIL_* as backward-compatible overrides.
spring.mail.host=${MAIL_HOST:${SPRING_MAIL_HOST:localhost}}
spring.mail.port=${MAIL_PORT:${SPRING_MAIL_PORT:25}}
spring.mail.username=${MAIL_USERNAME:${SPRING_MAIL_USERNAME:no-reply@texmintra.com}}
spring.mail.password=${MAIL_PASSWORD:${SPRING_MAIL_PASSWORD:}}
spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:${SPRING_MAIL_SMTP_AUTH:true}}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SMTP_SSL_ENABLE:${SPRING_MAIL_SMTP_SSL_ENABLE:true}}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:10000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:10000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:10000}
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:${SPRING_MAIL_USERNAME:no-reply@texmintra.com}}}
