spring.application.name=billTop

# ========================
# Server Configuration
# ========================
server.port=${PORT:8081}
server.servlet.context-path=/

# ========================
# Database Configuration
# ========================
# Required at runtime. Flyway uses this datasource unless separate
# spring.flyway.url/user/password properties are configured.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / Hibernate Configuration
# ========================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.open-in-view=false

# ========================
# JPA Auditing Configuration
# ========================
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.entity-defs.mapping-precedence=class,hbm

# ========================
# Flyway Configuration
# ========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=false
spring.flyway.clean-on-validation-error=false

# ========================
# JWT Configuration
# ========================
jwt.secret=${JWT_SECRET:your-super-secret-jwt-key-change-this-in-production-environment}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ========================
# File Upload Configuration
# ========================
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:6MB}

# ========================
# AWS S3 Configuration
# ========================
app.aws.s3.bucket=${AWS_S3_BUCKET:nexoraa-billing-top}
app.aws.s3.region=${AWS_REGION:ap-south-1}
app.aws.s3.public-url=${AWS_S3_PUBLIC_URL:https://nexoraa-billing-top.s3.ap-south-1.amazonaws.com}
app.aws.s3.max-image-size=${AWS_S3_MAX_IMAGE_SIZE:5MB}
app.aws.s3.allowed-content-types=${AWS_S3_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp}

# ========================
# Logging Configuration
# ========================
logging.level.root=INFO
logging.level.com.nexoraa.billtop=${APP_LOG_LEVEL:INFO}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n%ex{full}

# ========================
# CORS Configuration
# ========================
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

# ========================
# Swagger/OpenAPI Configuration
# ========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ========================
# API Permissions Configuration
# ========================
# Auth Endpoints
security.permission.auth.login=/api/v1/auth/login:AUTH_LOGIN
security.permission.auth.register=/api/v1/auth/register:AUTH_REGISTER

# Item Endpoints
security.permission.item.create=/api/v1/items/create:ITEM_CREATE
security.permission.item.update=/api/v1/items/{id}/update:ITEM_UPDATE
security.permission.item.delete=/api/v1/items/{id}/delete:ITEM_DELETE
security.permission.item.view=/api/v1/items:ITEM_VIEW
security.permission.item.get=/api/v1/items/{id}:ITEM_VIEW

# Category Endpoints
security.permission.category.create=/api/v1/categories:CATEGORY_CREATE
security.permission.category.update=/api/v1/categories/{id}:CATEGORY_UPDATE
security.permission.category.delete=/api/v1/categories/{id}:CATEGORY_DELETE
security.permission.category.view=/api/v1/categories:CATEGORY_VIEW

# Brand Endpoints
security.permission.brand.create=/api/v1/brands:BRAND_CREATE
security.permission.brand.update=/api/v1/brands/{id}:BRAND_UPDATE
security.permission.brand.delete=/api/v1/brands/{id}:BRAND_DELETE
security.permission.brand.view=/api/v1/brands:BRAND_VIEW
security.permission.brand.by-category=/api/v1/brands/category/{categoryId}:BRAND_VIEW

# Unit Endpoints
security.permission.unit.create=/api/v1/units:UNIT_CREATE
security.permission.unit.update=/api/v1/units/{id}:UNIT_UPDATE
security.permission.unit.delete=/api/v1/units/{id}:UNIT_DELETE
security.permission.unit.view=/api/v1/units:UNIT_VIEW
security.permission.unit.get=/api/v1/units/{id}:UNIT_VIEW

# Role Endpoints
security.permission.role.create=/api/v1/roles/create:ROLE_MANAGE
security.permission.role.update=/api/v1/roles/{id}/update:ROLE_MANAGE
security.permission.role.delete=/api/v1/roles/{id}/delete:ROLE_MANAGE
security.permission.role.view=/api/v1/roles:ROLE_MANAGE

# User Endpoints
security.permission.user.create=/api/v1/users:USER_MANAGE
security.permission.user.update=/api/v1/users/{id}:USER_MANAGE
security.permission.user.delete=/api/v1/users/{id}:USER_MANAGE
security.permission.user.view=/api/v1/users:USER_MANAGE
security.permission.user.profile=/api/v1/users/profile:USER_PROFILE
security.permission.user.change-password=/api/v1/users/change-password:USER_CHANGE_PASSWORD
security.permission.user.update-profile=/api/v1/users/update-profile:USER_UPDATE_PROFILE
security.permission.user.upload-profile-image=/api/v1/users/{id}/profile-image:USER_UPDATE_PROFILE

# Organization Endpoints
security.permission.organization.create=/api/v1/organizations:ORGANIZATION_CREATE
security.permission.organization.update=/api/v1/organizations/{id}:ORGANIZATION_UPDATE
security.permission.organization.delete=/api/v1/organizations/{id}:ORGANIZATION_DELETE
security.permission.organization.view=/api/v1/organizations:ORGANIZATION_VIEW
security.permission.organization.get=/api/v1/organizations/{id}:ORGANIZATION_VIEW
security.permission.organization.upload-logo=/api/v1/organizations/{id}/logo:ORGANIZATION_UPDATE

# Carrier Endpoints
security.permission.carrier.create=/api/v1/carriers:CARRIER_CREATE
security.permission.carrier.update=/api/v1/carriers/{id}:CARRIER_UPDATE
security.permission.carrier.delete=/api/v1/carriers/{id}:CARRIER_DELETE
security.permission.carrier.view=/api/v1/carriers:CARRIER_VIEW
security.permission.carrier.get=/api/v1/carriers/{id}:CARRIER_VIEW

# Location Endpoints
security.permission.country.view=/api/v1/countries:COUNTRY_VIEW
security.permission.state.view=/api/v1/states:STATE_VIEW

# ========================
# SMS Provider Configuration
# ========================
app.sms.provider-url=${SMS_PROVIDER_URL:}
app.sms.api-key=${SMS_API_KEY:}

# ========================
# Email Provider Configuration
# ========================
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:25}
spring.mail.username=${SPRING_MAIL_USERNAME:no-reply@billtop.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}
