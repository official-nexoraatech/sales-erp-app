# Permission Configuration File
# This file defines all API permissions with their groups and descriptions

permissions:

  # ===================== ITEM MANAGEMENT =====================
  item:
    group: "Item"
    permissions:
      - name: "ITEM_CREATE"
        description: "Create a new item in the inventory"
        endpoint: "POST /api/v1/items"
      - name: "ITEM_VIEW"
        description: "View items list and retrieve item details"
        endpoint: "GET /api/v1/items, GET /api/v1/items/{id}"
      - name: "ITEM_UPDATE"
        description: "Update an existing item"
        endpoint: "PUT /api/v1/items/{id}"
      - name: "ITEM_DELETE"
        description: "Delete an item from inventory"
        endpoint: "DELETE /api/v1/items/{id}"
      - name: "ITEM_STOCK_VIEW"
        description: "View item stock information"
        endpoint: "GET /api/v1/items/{id}/stock"
      - name: "ITEM_IMPORT"
        description: "Import items from Excel file"
        endpoint: "POST /api/v1/items/excel/import"

  # ===================== CATEGORY MANAGEMENT =====================
  category:
    group: "Category"
    permissions:
      - name: "CATEGORY_CREATE"
        description: "Create a new product category"
        endpoint: "POST /api/v1/categories"
      - name: "CATEGORY_VIEW"
        description: "View categories list"
        endpoint: "GET /api/v1/categories"
      - name: "CATEGORY_UPDATE"
        description: "Update an existing category"
        endpoint: "PUT /api/v1/categories/{id}"
      - name: "CATEGORY_DELETE"
        description: "Delete a category"
        endpoint: "DELETE /api/v1/categories/{id}"

  # ===================== BRAND MANAGEMENT =====================
  brand:
    group: "Brand"
    permissions:
      - name: "BRAND_CREATE"
        description: "Create a new product brand"
        endpoint: "POST /api/v1/brands"
      - name: "BRAND_VIEW"
        description: "View brands list and by category"
        endpoint: "GET /api/v1/brands, GET /api/v1/brands/category/{categoryId}"
      - name: "BRAND_UPDATE"
        description: "Update an existing brand"
        endpoint: "PUT /api/v1/brands/{id}"
      - name: "BRAND_DELETE"
        description: "Delete a brand"
        endpoint: "DELETE /api/v1/brands/{id}"

  # ===================== UNIT MANAGEMENT =====================
  unit:
    group: "Unit"
    permissions:
      - name: "UNIT_CREATE"
        description: "Create a new measurement unit"
        endpoint: "POST /api/v1/units"
      - name: "UNIT_VIEW"
        description: "View units list and retrieve unit details"
        endpoint: "GET /api/v1/units, GET /api/v1/units/{id}"
      - name: "UNIT_UPDATE"
        description: "Update an existing unit"
        endpoint: "PUT /api/v1/units/{id}"
      - name: "UNIT_DELETE"
        description: "Delete a unit"
        endpoint: "DELETE /api/v1/units/{id}"

  # ===================== WAREHOUSE MANAGEMENT =====================
  warehouse:
    group: "Warehouse"
    permissions:
      - name: "WAREHOUSE_CREATE"
        description: "Create a new warehouse"
        endpoint: "POST /api/v1/warehouses"
      - name: "WAREHOUSE_VIEW"
        description: "View warehouses list"
        endpoint: "GET /api/v1/warehouses"
      - name: "WAREHOUSE_UPDATE"
        description: "Update an existing warehouse"
        endpoint: "PUT /api/v1/warehouses/{id}"
      - name: "WAREHOUSE_DELETE"
        description: "Delete a warehouse"
        endpoint: "DELETE /api/v1/warehouses/{id}"

  # ===================== CUSTOMER MANAGEMENT =====================
  customer:
    group: "Customer"
    permissions:
      - name: "CUSTOMER_CREATE"
        description: "Create a new customer"
        endpoint: "POST /api/v1/customers"
      - name: "CUSTOMER_VIEW"
        description: "View customers list and retrieve customer details"
        endpoint: "GET /api/v1/customers, GET /api/v1/customers/{id}"
      - name: "CUSTOMER_UPDATE"
        description: "Update an existing customer"
        endpoint: "PUT /api/v1/customers/{id}"
      - name: "CUSTOMER_DELETE"
        description: "Delete a customer"
        endpoint: "DELETE /api/v1/customers/{id}"
      - name: "CUSTOMER_LEDGER_VIEW"
        description: "View customer ledger and transactions"
        endpoint: "GET /api/v1/customers/{id}/ledger"

  # ===================== SUPPLIER MANAGEMENT =====================
  supplier:
    group: "Supplier"
    permissions:
      - name: "SUPPLIER_CREATE"
        description: "Create a new supplier"
        endpoint: "POST /api/v1/suppliers"
      - name: "SUPPLIER_VIEW"
        description: "View suppliers list and retrieve supplier details"
        endpoint: "GET /api/v1/suppliers, GET /api/v1/suppliers/{id}"
      - name: "SUPPLIER_UPDATE"
        description: "Update an existing supplier"
        endpoint: "PUT /api/v1/suppliers/{id}"
      - name: "SUPPLIER_DELETE"
        description: "Delete a supplier"
        endpoint: "DELETE /api/v1/suppliers/{id}"
      - name: "SUPPLIER_LEDGER_VIEW"
        description: "View supplier ledger and transactions"
        endpoint: "GET /api/v1/suppliers/{id}/ledger"

  # ===================== CARRIER MANAGEMENT =====================
  carrier:
    group: "Carrier"
    permissions:
      - name: "CARRIER_CREATE"
        description: "Create a new shipping carrier"
        endpoint: "POST /api/v1/carriers"
      - name: "CARRIER_VIEW"
        description: "View carriers list and retrieve carrier details"
        endpoint: "GET /api/v1/carriers, GET /api/v1/carriers/{id}"
      - name: "CARRIER_UPDATE"
        description: "Update an existing carrier"
        endpoint: "PUT /api/v1/carriers/{id}"
      - name: "CARRIER_DELETE"
        description: "Delete a carrier"
        endpoint: "DELETE /api/v1/carriers/{id}"

  # ===================== PURCHASE MANAGEMENT =====================
  purchase:
    group: "Purchase"
    permissions:
      - name: "PURCHASE_CREATE"
        description: "Create a new purchase order"
        endpoint: "POST /api/v1/purchases"
      - name: "PURCHASE_VIEW"
        description: "View purchases list and retrieve purchase details"
        endpoint: "GET /api/v1/purchases, GET /api/v1/purchases/{id}"
      - name: "PURCHASE_UPDATE"
        description: "Update an existing purchase order"
        endpoint: "PUT /api/v1/purchases/{id}"
      - name: "PURCHASE_DELETE"
        description: "Cancel a purchase order"
        endpoint: "PUT /api/v1/purchases/{id}/cancel"

  # ===================== PURCHASE RETURN MANAGEMENT =====================
  purchase_return:
    group: "Purchase Return"
    permissions:
      - name: "PURCHASE_RETURN_CREATE"
        description: "Create a new purchase return"
        endpoint: "POST /api/v1/purchase-returns"
      - name: "PURCHASE_RETURN_VIEW"
        description: "View purchase returns list and retrieve details"
        endpoint: "GET /api/v1/purchase-returns, GET /api/v1/purchase-returns/{id}"

  # ===================== SALES MANAGEMENT =====================
  sales:
    group: "Sales"
    permissions:
      - name: "SALES_CREATE"
        description: "Create a new sales invoice"
        endpoint: "POST /api/v1/sales"
      - name: "SALES_VIEW"
        description: "View sales invoices list and retrieve details"
        endpoint: "GET /api/v1/sales, GET /api/v1/sales/{id}"
      - name: "SALES_UPDATE"
        description: "Update an existing sales invoice"
        endpoint: "PUT /api/v1/sales/{id}"
      - name: "SALES_DELETE"
        description: "Cancel a sales invoice"
        endpoint: "PUT /api/v1/sales/{id}/cancel"
      - name: "SALES_INVOICE_PRINT"
        description: "Print and retrieve sales invoice"
        endpoint: "GET /api/v1/sales/{id}/invoice"

  # ===================== SALES RETURN MANAGEMENT =====================
  sales_return:
    group: "Sales Return"
    permissions:
      - name: "SALES_RETURN_CREATE"
        description: "Create a new sales return"
        endpoint: "POST /api/v1/sales-returns"
      - name: "SALES_RETURN_VIEW"
        description: "View sales returns list and retrieve details"
        endpoint: "GET /api/v1/sales-returns, GET /api/v1/sales-returns/{id}"

  # ===================== PAYMENT MANAGEMENT =====================
  payment:
    group: "Payment"
    permissions:
      - name: "PAYMENT_IN_CREATE"
        description: "Record incoming payment from customers"
        endpoint: "POST /api/v1/payment-in"
      - name: "PAYMENT_IN_VIEW"
        description: "View incoming payments list and retrieve details"
        endpoint: "GET /api/v1/payment-in, GET /api/v1/payment-in/{id}"
      - name: "PAYMENT_OUT_CREATE"
        description: "Record outgoing payment to suppliers"
        endpoint: "POST /api/v1/payment-out"
      - name: "PAYMENT_OUT_VIEW"
        description: "View outgoing payments list and retrieve details"
        endpoint: "GET /api/v1/payment-out, GET /api/v1/payment-out/{id}"

  # ===================== BANK ACCOUNT MANAGEMENT =====================
  bank_account:
    group: "Bank Account"
    permissions:
      - name: "BANK_ACCOUNT_CREATE"
        description: "Create a new bank account"
        endpoint: "POST /api/v1/bank-accounts"
      - name: "BANK_ACCOUNT_VIEW"
        description: "View bank accounts list and transactions"
        endpoint: "GET /api/v1/bank-accounts, GET /api/v1/bank-accounts/{id}/transactions"

  # ===================== CASH MANAGEMENT =====================
  cash:
    group: "Cash"
    permissions:
      - name: "CASH_VIEW"
        description: "View cash summary and transactions"
        endpoint: "GET /api/v1/cash/summary, GET /api/v1/cash/transactions"

  # ===================== EXPENSE MANAGEMENT =====================
  expense:
    group: "Expense"
    permissions:
      - name: "EXPENSE_CREATE"
        description: "Record a new expense"
        endpoint: "POST /api/v1/expenses"
      - name: "EXPENSE_VIEW"
        description: "View expenses list and retrieve expense details"
        endpoint: "GET /api/v1/expenses, GET /api/v1/expenses/{id}"
      - name: "EXPENSE_UPDATE"
        description: "Update an existing expense"
        endpoint: "PUT /api/v1/expenses/{id}"
      - name: "EXPENSE_DELETE"
        description: "Delete an expense record"
        endpoint: "DELETE /api/v1/expenses/{id}"

  # ===================== STOCK MANAGEMENT =====================
  stock:
    group: "Stock"
    permissions:
      - name: "STOCK_ADJUSTMENT_CREATE"
        description: "Create a stock adjustment"
        endpoint: "POST /api/v1/stocks/adjustments"
      - name: "STOCK_ADJUSTMENT_VIEW"
        description: "View stock adjustments list and retrieve details"
        endpoint: "GET /api/v1/stocks/adjustments, GET /api/v1/stocks/adjustments/{id}"
      - name: "STOCK_TRANSFER_CREATE"
        description: "Transfer stock between warehouses"
        endpoint: "POST /api/v1/stocks/transfers"
      - name: "STOCK_TRANSFER_VIEW"
        description: "View stock transfers list and retrieve details"
        endpoint: "GET /api/v1/stocks/transfers, GET /api/v1/stocks/transfers/{id}"

  # ===================== POS MANAGEMENT =====================
  pos:
    group: "POS"
    permissions:
      - name: "POS_BILLING_CREATE"
        description: "Generate POS billing for point of sale"
        endpoint: "POST /api/v1/pos/billing"

  # ===================== ROLE MANAGEMENT =====================
  role:
    group: "Role"
    permissions:
      - name: "ROLE_CREATE"
        description: "Create a new role with permissions"
        endpoint: "POST /api/v1/roles"
      - name: "ROLE_VIEW"
        description: "View roles list and retrieve role details"
        endpoint: "GET /api/v1/roles, GET /api/v1/roles/{id}, GET /api/v1/roles/organization/{organizationId}"
      - name: "ROLE_UPDATE"
        description: "Update an existing role"
        endpoint: "PUT /api/v1/roles/{id}"
      - name: "ROLE_DELETE"
        description: "Delete a role"
        endpoint: "DELETE /api/v1/roles/{id}"

  # ===================== USER MANAGEMENT =====================
  user:
    group: "User"
    permissions:
      - name: "USER_CREATE"
        description: "Create a new user account"
        endpoint: "POST /api/v1/users"
      - name: "USER_VIEW"
        description: "View users list and retrieve user details"
        endpoint: "GET /api/v1/users"
      - name: "USER_UPDATE"
        description: "Update an existing user"
        endpoint: "PUT /api/v1/users/{id}"
      - name: "USER_DELETE"
        description: "Delete a user account"
        endpoint: "DELETE /api/v1/users/{id}"
      - name: "USER_PROFILE_VIEW"
        description: "View user's own profile"
        endpoint: "GET /api/v1/users/profile"
      - name: "USER_PROFILE_UPDATE"
        description: "Update user's own profile"
        endpoint: "PUT /api/v1/users/update-profile"
      - name: "USER_CHANGE_PASSWORD"
        description: "Change user password"
        endpoint: "PUT /api/v1/users/change-password"
      - name: "USER_PROFILE_IMAGE_UPLOAD"
        description: "Upload user profile image"
        endpoint: "POST /api/v1/users/{id}/profile-image"

  # ===================== ORGANIZATION MANAGEMENT =====================
  organization:
    group: "Organization"
    permissions:
      - name: "ORGANIZATION_CREATE"
        description: "Create a new organization"
        endpoint: "POST /api/v1/organizations"
      - name: "ORGANIZATION_VIEW"
        description: "View organizations list and retrieve organization details"
        endpoint: "GET /api/v1/organizations, GET /api/v1/organizations/{id}"
      - name: "ORGANIZATION_UPDATE"
        description: "Update an existing organization"
        endpoint: "PUT /api/v1/organizations/{id}"
      - name: "ORGANIZATION_DELETE"
        description: "Delete an organization"
        endpoint: "DELETE /api/v1/organizations/{id}"
      - name: "ORGANIZATION_LOGO_UPLOAD"
        description: "Upload organization logo"
        endpoint: "POST /api/v1/organizations/{id}/logo"

  # ===================== STAFF EMPLOYEE MANAGEMENT =====================
  staff_employee:
    group: "Staff Employee"
    permissions:
      - name: "STAFF_EMPLOYEE_CREATE"
        description: "Create a new employee record"
        endpoint: "POST /api/v1/staff/employees"
      - name: "STAFF_EMPLOYEE_VIEW"
        description: "View employees list and retrieve employee details"
        endpoint: "GET /api/v1/staff/employees, GET /api/v1/staff/employees/{id}"
      - name: "STAFF_EMPLOYEE_UPDATE"
        description: "Update an existing employee record"
        endpoint: "PUT /api/v1/staff/employees/{id}"
      - name: "STAFF_EMPLOYEE_DELETE"
        description: "Delete an employee record"
        endpoint: "DELETE /api/v1/staff/employees/{id}"
      - name: "STAFF_DOCUMENT_UPLOAD"
        description: "Upload employee documents"
        endpoint: "POST /api/v1/staff/employees/{id}/documents"
      - name: "STAFF_DOCUMENT_VIEW"
        description: "View employee documents"
        endpoint: "GET /api/v1/staff/employees/{id}/documents"
      - name: "STAFF_DOCUMENT_DELETE"
        description: "Delete employee documents"
        endpoint: "DELETE /api/v1/staff/employees/{id}/documents/{documentId}"

  # ===================== STAFF ATTENDANCE MANAGEMENT =====================
  staff_attendance:
    group: "Staff Attendance"
    permissions:
      - name: "STAFF_ATTENDANCE_CREATE"
        description: "Mark staff attendance"
        endpoint: "POST /api/v1/staff/attendance"
      - name: "STAFF_ATTENDANCE_VIEW"
        description: "View attendance records and summary"
        endpoint: "GET /api/v1/staff/attendance, GET /api/v1/staff/attendance/summary"
      - name: "STAFF_ATTENDANCE_UPDATE"
        description: "Update attendance record"
        endpoint: "PUT /api/v1/staff/attendance/{id}"

  # ===================== STAFF LEAVE MANAGEMENT =====================
  staff_leave:
    group: "Staff Leave"
    permissions:
      - name: "STAFF_LEAVE_CREATE"
        description: "Create a leave request"
        endpoint: "POST /api/v1/staff/leaves"
      - name: "STAFF_LEAVE_VIEW"
        description: "View leave requests and balance"
        endpoint: "GET /api/v1/staff/leaves, GET /api/v1/staff/leaves/balance"
      - name: "STAFF_LEAVE_APPROVE"
        description: "Approve a leave request"
        endpoint: "PUT /api/v1/staff/leaves/{id}/approve"
      - name: "STAFF_LEAVE_REJECT"
        description: "Reject a leave request"
        endpoint: "PUT /api/v1/staff/leaves/{id}/reject"
      - name: "STAFF_LEAVE_CANCEL"
        description: "Cancel a leave request"
        endpoint: "PUT /api/v1/staff/leaves/{id}/cancel"

  # ===================== STAFF PAYROLL MANAGEMENT =====================
  staff_payroll:
    group: "Staff Payroll"
    permissions:
      - name: "STAFF_PAYROLL_CREATE"
        description: "Generate payroll for staff"
        endpoint: "POST /api/v1/staff/payroll"
      - name: "STAFF_PAYROLL_VIEW"
        description: "View payroll records and details"
        endpoint: "GET /api/v1/staff/payroll, GET /api/v1/staff/payroll/{id}"
      - name: "STAFF_PAYROLL_UPDATE"
        description: "Mark payroll as paid"
        endpoint: "PUT /api/v1/staff/payroll/{id}/mark-paid"

  # ===================== STAFF SETTINGS MANAGEMENT =====================
  staff_setting:
    group: "Staff Setting"
    permissions:
      - name: "STAFF_SETTING_CREATE"
        description: "Create staff settings"
        endpoint: "POST /api/v1/staff/settings/{type}"
      - name: "STAFF_SETTING_VIEW"
        description: "View staff settings"
        endpoint: "GET /api/v1/staff/settings/{type}"
      - name: "STAFF_SETTING_UPDATE"
        description: "Update staff settings"
        endpoint: "PUT /api/v1/staff/settings/{type}/{id}"
      - name: "STAFF_SETTING_DELETE"
        description: "Delete staff settings"
        endpoint: "DELETE /api/v1/staff/settings/{type}/{id}"

  # ===================== SMS MANAGEMENT =====================
  sms:
    group: "SMS"
    permissions:
      - name: "SMS_TEMPLATE_CREATE"
        description: "Create SMS template"
        endpoint: "POST /api/v1/sms/templates"
      - name: "SMS_TEMPLATE_VIEW"
        description: "View SMS templates"
        endpoint: "GET /api/v1/sms/templates, GET /api/v1/sms/templates/{id}"
      - name: "SMS_TEMPLATE_UPDATE"
        description: "Update SMS template"
        endpoint: "PUT /api/v1/sms/templates/{id}"
      - name: "SMS_TEMPLATE_DELETE"
        description: "Delete SMS template"
        endpoint: "DELETE /api/v1/sms/templates/{id}"
      - name: "SMS_SEND"
        description: "Send SMS messages"
        endpoint: "POST /api/v1/sms/send"

  # ===================== EMAIL MANAGEMENT =====================
  email:
    group: "Email"
    permissions:
      - name: "EMAIL_TEMPLATE_CREATE"
        description: "Create email template"
        endpoint: "POST /api/v1/email/templates"
      - name: "EMAIL_TEMPLATE_VIEW"
        description: "View email templates"
        endpoint: "GET /api/v1/email/templates, GET /api/v1/email/templates/{id}"
      - name: "EMAIL_TEMPLATE_UPDATE"
        description: "Update email template"
        endpoint: "PUT /api/v1/email/templates/{id}"
      - name: "EMAIL_TEMPLATE_DELETE"
        description: "Delete email template"
        endpoint: "DELETE /api/v1/email/templates/{id}"
      - name: "EMAIL_SEND"
        description: "Send email messages"
        endpoint: "POST /api/v1/email/send"

  # ===================== REPORTS =====================
  report:
    group: "Report"
    permissions:
      - name: "REPORT_SALES_VIEW"
        description: "View sales reports"
        endpoint: "GET /api/v1/reports/sales"
      - name: "REPORT_PURCHASE_VIEW"
        description: "View purchase reports"
        endpoint: "GET /api/v1/reports/purchases"
      - name: "REPORT_STOCK_VIEW"
        description: "View stock reports"
        endpoint: "GET /api/v1/reports/stocks"
      - name: "REPORT_LOW_STOCK_VIEW"
        description: "View low stock reports"
        endpoint: "GET /api/v1/reports/low-stock"
      - name: "REPORT_CUSTOMER_LEDGER_VIEW"
        description: "View customer ledger reports"
        endpoint: "GET /api/v1/reports/customer-ledger/{customerId}"
      - name: "REPORT_SUPPLIER_LEDGER_VIEW"
        description: "View supplier ledger reports"
        endpoint: "GET /api/v1/reports/supplier-ledger/{supplierId}"
      - name: "REPORT_PROFIT_LOSS_VIEW"
        description: "View profit and loss reports"
        endpoint: "GET /api/v1/reports/profit-loss"
      - name: "REPORT_GST_VIEW"
        description: "View GST reports"
        endpoint: "GET /api/v1/reports/gst"
      - name: "REPORT_INVENTORY_VALUATION_VIEW"
        description: "View inventory valuation reports"
        endpoint: "GET /api/v1/reports/inventory-valuation"
      - name: "REPORT_TOP_SELLING_ITEMS_VIEW"
        description: "View top selling items reports"
        endpoint: "GET /api/v1/reports/top-selling-items"
      - name: "REPORT_DAY_BOOK_VIEW"
        description: "View day book reports"
        endpoint: "GET /api/v1/reports/day-book"

  # ===================== DASHBOARD =====================
  dashboard:
    group: "Dashboard"
    permissions:
      - name: "DASHBOARD_VIEW"
        description: "View dashboard summary"
        endpoint: "GET /api/v1/dashboard/summary"

  # ===================== LOCATIONS =====================
  location:
    group: "Location"
    permissions:
      - name: "COUNTRY_VIEW"
        description: "View countries list"
        endpoint: "GET /api/v1/countries"
      - name: "STATE_VIEW"
        description: "View states by country"
        endpoint: "GET /api/v1/states"

  # ===================== CONTACTS IMPORT =====================
  contact_import:
    group: "Contact Import"
    permissions:
      - name: "CONTACT_IMPORT"
        description: "Import contacts from Excel file"
        endpoint: "POST /api/v1/contacts/excel/import"
