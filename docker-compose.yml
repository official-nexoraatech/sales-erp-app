name: erp-local

services:
  # ─── PostgreSQL 16 Primary ────────────────────────────────────────────────
  postgres-primary:
    image: postgres:16
    container_name: erp-postgres-primary
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp_password
      POSTGRES_DB: erp
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '5435:5432'
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U erp -d erp']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ─── PostgreSQL 16 Replica (second instance for dev — not streaming replication) ──
  postgres-replica:
    image: postgres:16
    container_name: erp-postgres-replica
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp_password
      POSTGRES_DB: erp
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '5436:5432'
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U erp -d erp']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ─── Redis 7 (standalone — app uses ioredis single-node via REDIS_URL) ────
  redis-1:
    image: redis:7-alpine
    container_name: erp-redis-1
    command: redis-server --appendonly yes --bind 0.0.0.0 --loglevel notice
    ports:
      - '6379:6379'
    volumes:
      - redis_1_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ─── Zookeeper ────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: erp-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_HEAP_OPTS: '-Xmx256m -Xms256m'
    ports:
      - '2181:2181'
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ['CMD-SHELL', "echo srvr | nc localhost 2181 | grep -q 'Zookeeper version'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ─── Kafka 3.6 (via Confluent Platform) ──────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: erp-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_HEAP_OPTS: '-Xmx512m -Xms256m'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - '29092:29092'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'kafka-topics --bootstrap-server localhost:9092 --list 2>/dev/null && echo ok',
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  # ─── MinIO (S3-compatible object storage) ─────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: erp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ─── Elasticsearch 8 ─────────────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.17.0
    container_name: erp-elasticsearch
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: '-Xms512m -Xmx512m'
      xpack.security.enabled: 'false'
      xpack.security.http.ssl.enabled: 'false'
      bootstrap.memory_lock: 'true'
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - '9200:9200'
      - '9300:9300'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=10s || exit 1',
        ]
      interval: 15s
      timeout: 15s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ─── Jaeger (Distributed Tracing) ────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: erp-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
      SPAN_STORAGE_TYPE: memory
    ports:
      - '16686:16686'
      - '4317:4317'
      - '4318:4318'
      - '14268:14268'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:14269/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─── Loki (Centralized Log Aggregation) ────────────────────────────────────
  # No Promtail sidecar — every service pushes structured logs directly via
  # @erp/logger's LokiTransport (see packages/logger/src/loki-transport.ts),
  # so a log-file-tailing scraper would be redundant here.
  loki:
    image: grafana/loki:3.3.2
    container_name: erp-loki
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - '3100:3100'
    volumes:
      - ./infrastructure/docker/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3100/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─── Prometheus ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: erp-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - '9090:9090'
    volumes:
      - ./infrastructure/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:9090/-/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─── Alertmanager ──────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: erp-alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - '9093:9093'
    volumes:
      - ./infrastructure/docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    secrets:
      - pagerduty_service_key
      - slack_infra_webhook_url
      - slack_engineering_webhook_url
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:9093/-/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─── Grafana ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.4.0
    container_name: erp-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_HTTP_PORT: 3000
    ports:
      - '3001:3000'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ─── Mailhog (Email testing) ──────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: erp-mailhog
    ports:
      - '1025:1025'
      - '8025:8025'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8025/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ─── HashiCorp Vault (Dev mode) ───────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.18
    container_name: erp-vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    cap_add:
      - IPC_LOCK
    ports:
      - '8200:8200'
    healthcheck:
      test: ['CMD-SHELL', "vault status | grep -q 'Initialized'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─── PgBouncer (Task 13.3.3 — transaction-mode connection pooling) ────────
  pgbouncer:
    image: bitnamilegacy/pgbouncer:1.23.1
    container_name: erp-pgbouncer
    environment:
      POSTGRESQL_HOST: postgres-primary
      POSTGRESQL_PORT: 5432
      POSTGRESQL_DATABASE: erp
      POSTGRESQL_USERNAME: erp
      POSTGRESQL_PASSWORD: erp_password
      PGBOUNCER_AUTH_TYPE: md5
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 1000
      PGBOUNCER_DEFAULT_POOL_SIZE: 25
      PGBOUNCER_MIN_POOL_SIZE: 5
      PGBOUNCER_RESERVE_POOL_SIZE: 10
    ports:
      - '5434:6432'
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      # Bitnami's pgbouncer image ships no pg_isready/psql-on-PATH tool that can
      # reach pgbouncer's actual port (6432, not postgres' 5432) — a plain TCP
      # check via bash's /dev/tcp is the only thing this image can run.
      test: ['CMD-SHELL', "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6432' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─── postgres-exporter (Prometheus scraping for PostgreSQL metrics) ────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: erp-postgres-exporter
    environment:
      DATA_SOURCE_NAME: 'postgresql://erp:erp_password@postgres-primary:5432/erp?sslmode=disable'
    ports:
      - '9187:9187'
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:9187/metrics | head -1 || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ─── redis-exporter (Prometheus scraping for Redis metrics) ───────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    container_name: erp-redis-exporter
    environment:
      REDIS_ADDR: redis://redis-1:6379
    ports:
      - '9121:9121'
    depends_on:
      redis-1:
        condition: service_healthy
    # No healthcheck: this image is a distroless single static binary (no shell,
    # no wget/curl) — CMD-SHELL can't exec anything in it. Nothing depends_on
    # this service with condition: service_healthy, so it's safe to leave
    # unmonitored at the Docker level; Prometheus scrapes :9121/metrics directly.
    restart: unless-stopped

  # ─── Pushgateway (PG-024 — batch-job metrics) ──────────────────────────────
  # The `backup` job below is a cron/batch process, not a long-running scrape
  # target — it pushes erp_backup_last_success_timestamp/duration/size here
  # after every run, and Prometheus scrapes Pushgateway itself (see
  # infrastructure/docker/prometheus/prometheus.yml `pushgateway` job).
  pushgateway:
    image: prom/pushgateway:v1.9.0
    container_name: erp-pushgateway
    ports:
      - '9091:9091'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:9091/-/healthy || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─── Automated Backup (M13) ────────────────────────────────────────────────
  # Automates the manual steps proven correct in ERP-PLANNING/phase-completions/
  # dr-drill-report.md: pg_dump -Fc, Redis SAVE, MinIO mirror — on a daily cron.
  # PG-024 adds an encrypted offsite copy + Pushgateway metrics on top.
  backup:
    build:
      context: ./infrastructure/docker/backup
    container_name: erp-backup
    environment:
      PGHOST: postgres-primary
      PGPORT: 5432
      PGUSER: erp
      PGPASSWORD: erp_password
      PGDATABASE: erp
      REDIS_HOST: redis-1
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: erp-local
      BACKUP_INTERVAL_SECONDS: '86400'
      # PG-024 — offsite copy + encryption + metrics. Empty by default in local
      # dev (offsite copy/encryption are skipped when unset — see backup.sh);
      # set real values in .env for staging/production.
      OFFSITE_MINIO_ENDPOINT: '${OFFSITE_MINIO_ENDPOINT:-}'
      OFFSITE_MINIO_ACCESS_KEY: '${OFFSITE_MINIO_ACCESS_KEY:-}'
      OFFSITE_MINIO_SECRET_KEY: '${OFFSITE_MINIO_SECRET_KEY:-}'
      OFFSITE_MINIO_BUCKET: '${OFFSITE_MINIO_BUCKET:-erp-backups-offsite}'
      BACKUP_ENCRYPTION_PUBLIC_KEY: '${BACKUP_ENCRYPTION_PUBLIC_KEY:-}'
      PUSHGATEWAY_URL: 'http://pushgateway:9091'
    volumes:
      - backups_data:/backups
      - redis_1_data:/redis-data:ro
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis-1:
        condition: service_healthy
      minio:
        condition: service_healthy
      pushgateway:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_primary_data:
  postgres_replica_data:
  redis_1_data:
  zookeeper_data:
  kafka_data:
  minio_data:
  elasticsearch_data:
  prometheus_data:
  loki_data:
  grafana_data:
  alertmanager_data:
  backups_data:

networks:
  default:
    name: erp-network
    driver: bridge

secrets:
  pagerduty_service_key:
    environment: PAGERDUTY_SERVICE_KEY
  slack_infra_webhook_url:
    environment: SLACK_INFRA_WEBHOOK_URL
  slack_engineering_webhook_url:
    environment: SLACK_ENGINEERING_WEBHOOK_URL
