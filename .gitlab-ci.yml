stages:
  - build
  - deploy

variables:
  DOCKER_TLS_CERTDIR: ""
  GIT_STRATEGY: clone
  GIT_CLEAN_FLAGS: -ffdx

build:
  stage: build
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - echo "Creating env files before build"

    - |
      cat > sale-erp-backend/.env <<EOF
      PORT=$PORT
      SPRING_DATASOURCE_URL=$SPRING_DATASOURCE_URL
      SPRING_DATASOURCE_USERNAME=$SPRING_DATASOURCE_USERNAME
      SPRING_DATASOURCE_PASSWORD=$SPRING_DATASOURCE_PASSWORD
      CORS_ALLOWED_ORIGIN_PATTERNS=$CORS_ALLOWED_ORIGIN_PATTERNS
      JWT_SECRET=$JWT_SECRET
      JWT_EXPIRATION=$JWT_EXPIRATION
      JWT_REFRESH_EXPIRATION=$JWT_REFRESH_EXPIRATION
      MAX_FILE_SIZE=$MAX_FILE_SIZE
      MAX_REQUEST_SIZE=$MAX_REQUEST_SIZE
      AWS_S3_BUCKET=$AWS_S3_BUCKET
      AWS_REGION=$AWS_REGION
      AWS_S3_PUBLIC_URL=$AWS_S3_PUBLIC_URL
      AWS_S3_MAX_IMAGE_SIZE=$AWS_S3_MAX_IMAGE_SIZE
      AWS_S3_ALLOWED_CONTENT_TYPES=$AWS_S3_ALLOWED_CONTENT_TYPES
      APP_LOG_LEVEL=$APP_LOG_LEVEL
      SECURITY_LOG_LEVEL=$SECURITY_LOG_LEVEL
      SMS_PROVIDER_URL=$SMS_PROVIDER_URL
      SMS_API_KEY=$SMS_API_KEY
      SPRING_MAIL_HOST=$SPRING_MAIL_HOST
      SPRING_MAIL_PORT=$SPRING_MAIL_PORT
      SPRING_MAIL_USERNAME=$SPRING_MAIL_USERNAME
      SPRING_MAIL_PASSWORD=$SPRING_MAIL_PASSWORD
      SPRING_MAIL_SMTP_AUTH=$SPRING_MAIL_SMTP_AUTH
      SPRING_MAIL_SMTP_STARTTLS_ENABLE=$SPRING_MAIL_SMTP_STARTTLS_ENABLE
      EOF

    - |
      cat > sale-erp-froentend/.env <<EOF
      VITE_API_BASE_URL=$VITE_API_BASE_URL
      EOF

    - echo "Building Docker images"
    - docker-compose build

deploy:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - echo "Creating env files before deploy"

    - |
      cat > sale-erp-backend/.env <<EOF
      PORT=$PORT
      SPRING_DATASOURCE_URL=$SPRING_DATASOURCE_URL
      SPRING_DATASOURCE_USERNAME=$SPRING_DATASOURCE_USERNAME
      SPRING_DATASOURCE_PASSWORD=$SPRING_DATASOURCE_PASSWORD
      CORS_ALLOWED_ORIGIN_PATTERNS=$CORS_ALLOWED_ORIGIN_PATTERNS
      JWT_SECRET=$JWT_SECRET
      JWT_EXPIRATION=$JWT_EXPIRATION
      JWT_REFRESH_EXPIRATION=$JWT_REFRESH_EXPIRATION
      MAX_FILE_SIZE=$MAX_FILE_SIZE
      MAX_REQUEST_SIZE=$MAX_REQUEST_SIZE
      AWS_S3_BUCKET=$AWS_S3_BUCKET
      AWS_REGION=$AWS_REGION
      AWS_S3_PUBLIC_URL=$AWS_S3_PUBLIC_URL
      AWS_S3_MAX_IMAGE_SIZE=$AWS_S3_MAX_IMAGE_SIZE
      AWS_S3_ALLOWED_CONTENT_TYPES=$AWS_S3_ALLOWED_CONTENT_TYPES
      APP_LOG_LEVEL=$APP_LOG_LEVEL
      SECURITY_LOG_LEVEL=$SECURITY_LOG_LEVEL
      SMS_PROVIDER_URL=$SMS_PROVIDER_URL
      SMS_API_KEY=$SMS_API_KEY
      SPRING_MAIL_HOST=$SPRING_MAIL_HOST
      SPRING_MAIL_PORT=$SPRING_MAIL_PORT
      SPRING_MAIL_USERNAME=$SPRING_MAIL_USERNAME
      SPRING_MAIL_PASSWORD=$SPRING_MAIL_PASSWORD
      SPRING_MAIL_SMTP_AUTH=$SPRING_MAIL_SMTP_AUTH
      SPRING_MAIL_SMTP_STARTTLS_ENABLE=$SPRING_MAIL_SMTP_STARTTLS_ENABLE
      EOF

    - |
      cat > sale-erp-froentend/.env <<EOF
      VITE_API_BASE_URL=$VITE_API_BASE_URL
      EOF

    - docker rm -f sale-erp-backend sale-erp-frontend 2>/dev/null || true
    - docker-compose up -d --no-build --remove-orphans
    - docker image prune -f
